name: Deploy Blog

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Build and deploy on server
        run: |
          ssh -p "${{ secrets.DEPLOY_PORT }}" -i ~/.ssh/id_deploy \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'set -e; \
             cd ~/SelfBlog; \
             git fetch origin main; \
             git reset --hard origin/main; \
             /usr/bin/pnpm install --frozen-lockfile; \
             /usr/bin/pnpm build; \
             rm -rf /var/www/selfblog/*; \
             cp -r dist/* /var/www/selfblog/; \
             echo "Deploy done."'
